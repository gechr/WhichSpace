version: 2

updates:
  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: swift
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      swift-packages:
        patterns:
          - "*"
    ignore:
      # EmojiKit 3.x requires macOS 15; stay on 2.x until we drop macOS 14 support.
      - dependency-name: "github.com/danielsaidi/EmojiKit"
        update-types: ["version-update:semver-major"]
